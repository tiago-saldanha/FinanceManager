name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore Finanza.Backend.slnf

      - name: Build
        run: dotnet build Finanza.Backend.slnf --no-restore --configuration Release

      - name: Run tests with coverage
        run: dotnet test Finanza.Backend.slnf --no-build --configuration Release --collect:"XPlat Code Coverage"
        env:
          Jwt__SecretKey: ${{ secrets.JWT_SECRET_KEY }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: '**/coverage.cobertura.xml'
          fail_ci_if_error: true
